name: Validate

on:
  push:
    branches: [ main ]
    tags:
      - '*'

jobs:
  html-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --panicOnWarning

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          config: .html5validator.yaml

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --panicOnWarning

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,403,405,429 --root-dir ${{ github.workspace }}/public --remap "https://david.alvarezrosa.com file://${{ github.workspace }}/public" 'public/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: docker/setup-buildx-action@v3

      - name: Build visual-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: personal-website-visual
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: SKIP_BUILD=1 CONTAINER_ENGINE=docker ./scripts/visual-test.sh

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
