name: Validate

on:
  push:
    branches: [ main ]
    tags:
      - '*'

jobs:
  html-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --panicOnWarning

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          config: .html5validator.yaml

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --panicOnWarning

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,202,403,405,429 --root-dir ${{ github.workspace }}/public --remap "https://david.alvarezrosa.com file://${{ github.workspace }}/public" 'public/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  playwright-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull test image
        run: |
          docker pull ghcr.io/david-alvarez-rosa/personal-website:latest
          docker tag ghcr.io/david-alvarez-rosa/personal-website:latest personal-website

      - run: CONTAINER_ENGINE=docker ./scripts/test.sh

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
